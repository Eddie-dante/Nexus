<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Sign Up · Nexus</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="signature">id³</div>
    <div id="toastContainer"></div>

    <div class="page active">
        <div class="container" style="text-align:center;">
            <span style="font-size:48px;display:block;margin-bottom:8px;">⚡</span>
            <h2 style="font-size:22px;font-weight:700;margin-bottom:4px;">Create Account</h2>
            <p style="color:#64748b;font-size:13px;margin-bottom:24px;">Join the Nexus</p>

            <input type="text" id="signupUsername" placeholder="Username" style="margin-bottom:10px;">
            <input type="password" id="signupPassword" placeholder="Password (min 6 chars)" style="margin-bottom:10px;">
            <input type="password" id="signupConfirm" placeholder="Confirm Password" style="margin-bottom:16px;">

            <button class="btn-primary" id="btnSignup">Create Account</button>
            <p id="signupError" style="color:#ef4444;font-size:11px;margin-top:8px;display:none;"></p>

            <p style="margin-top:20px;font-size:13px;color:#64748b;">
                Already have an account? <a href="login.html" style="color:#0f172a;font-weight:600;">Sign In</a>
            </p>
            <a href="index.html"><button class="btn-secondary">← Back</button></a>
        </div>
    </div>

    <!-- Load Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    
    <!-- Debug script -->
    <script>
        console.log('🔍 Debug - after scripts loaded:');
        console.log('  typeof supabase:', typeof supabase);
        console.log('  supabase exists:', typeof supabase !== 'undefined');
        if (typeof supabase !== 'undefined') {
            console.log('  supabase.from:', typeof supabase.from);
            console.log('  supabase.auth:', typeof supabase.auth);
        }
        console.log('  window.supabase:', typeof window.supabase);
        if (typeof window.supabase !== 'undefined') {
            console.log('  window.supabase.from:', typeof window.supabase.from);
        }
    </script>
</body>
</html>
